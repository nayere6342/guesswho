        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

            body {
                background-image: url(/guesswho/images/backg.png);

                margin-left: auto;

            }

            .cat {
                color: #e37f2d;
                padding: 10px;
                font-family: "Brush Script MT", "Courier New", monospace;

                text-shadow: 3px 3px black;
                font-size: 50px;
            }

            .name {
                padding: 35px;
                font-family: "Lucida Console", "Courier New", monospace;
                text-align: center;
                font-size: 40px;
                font-weight: bold;
            }

            .help {
                text-decoration-line: none;
                margin: 20px;
                padding: 10px;
                font-weight: bold;
                color: #97a6e8;
            }

            .help:hover {
                color: #ffffff;
                background-color: #97a6e8;
            }

            .back {
                text-decoration-line: none;
                margin: 20px;
                padding: 10px;
                font-weight: bold;
                color: #97a6e8;
            }

            .back:hover {
                color: #ffffff;
