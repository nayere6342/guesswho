<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

            body {
                background-image: url(/guesswho/images/backg.png);
                background-position: left top;
                background-repeat: repeat;
            }

            .i {
                width: 400px;
                height: 400px;
                border: 10px solid #f06969;
                display: block;
                margin-left: auto;
                margin-right: auto;
                border-radius: 40px;
            }

            .cat {
                color: #e37f2d;
                padding: 10px;
                font-family: "Brush Script MT", "Courier New", monospace;
                background-color: #b6e3c2;
                text-align: left;
                text-shadow: 3px 3px black;
                font-size: 50px;
            }

            .name {
                padding: 35px;
                font-family: "Lucida Console", "Courier New", monospace;
                font-size: 90px;
                font-weight: bold;
                text-align: center;
                overflow-wrap: break-word;
                word-wrap: break-word;
            }

            .back {
                text-decoration-line: none;
                font-weight: bold;
                color: #97a6e8;
                font-size: 30px;
                padding: 5px;
                cursor: pointer;
                position: absolute;
                top: 700px;
                left: 625px;
            }

            .back:hover {
                color: #ffffff;
                background-color: #97a6e8;
            }

            .custom {
                color: #97a6e8;
                font-size: 60px;
                padding: 5px;
                border: none;
                font-weight: bold;
                cursor: pointer;
                background-color: #ffffff;
                position: absolute;
                top: 500px;
                left: 565px;
            }

            .custom:hover {
                color: #ffffff;
                background-color: #97a6e8;
            }

            .ik {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                top: 100px;
                left: 1330px;
            }

            .if {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                cursor: pointer;
                top: 100px;
                left: 15px;
            }

            .hid {
                font-family: "Lucida Console", "Courier New", monospace;
                position: absolute;
                font-weight: bold;
                top: 300px;
                left: 300px;
                color: #f06969;
                font-size: 80px;
            }

            .l {
                color: #ffffff;
                font-size: 60px;
                padding: 5px;
                border: none;
                font-weight: bold;
                background-color: #f06969ff;
                position: absolute;
                top: 500px;
                left: 525px;

            }

            .text {
                padding: 35px;
                font-family: "Lucida Console", "Courier New", monospace;
                font-size: 40px;
                font-weight: bold;
                position: absolute;
                top: 30%;
                left: 31%;
                text-align: center;
            }


        </style>

        <title>Guess Who</title>
    </head>
    <body>
        <!-- HTML -->

        <h1 class="cat">Category: Classic</h1>

        <h2 class="name" id="newtxt">Input Name:</h2>

        <button type="button" id="lock" class="custom">
            Lock Guess
        </button>

        <a href="/guesswho/index.html" class="back">Back to Menu</a>

        <a type="finish" id="ff">
            <img src="/guesswho/images/forefeit.png" class="if">
        </a>

        <a href="p.html">
            <img src="/guesswho/images/redo.png" class="ik">
        </a>

        <input id="box" class="text"></input>

        <p id="mesg" class="hid"></p>

        <p id="lockr" class= "l"></p>






        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
            // JS

            const button = document.getElementById('lock');
                button.addEventListener('click', () => {
                const box = document.getElementById("box").value;
                document.getElementById("newtxt").innerHTML = box;
                if (box != "") {
                    document.getElementById("lockr").innerHTML = "Guess Locked!";
                    document.querySelector(".custom").remove();
                    document.querySelector(".text").remove();
                }
                if (box == "") {
                    document.getElementById("newtxt").innerHTML = "Input Something!";
                }
                });

            const finish = document.getElementById('ff');
                finish.addEventListener('click', () => {
                document.getElementById("mesg").innerHTML = "You Have Forefeit!";
                document.querySelector(".if").remove();
                document.querySelector(".ik").remove();
                });


        </script>
    </body>
</html>
