<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

            body {
                background-image: url(/guesswho/images/backg.png);
                background-position: left top;
                background-repeat: repeat;
            }

            .i {
                width: 400px;
                height: 400px;
                border: 10px solid #f06969;
                display: block;
                margin-left: auto;
                margin-right: auto;
                border-radius: 40px;
            }

            .cat {
                color: #e37f2d;
                padding: 10px;
                font-family: "Brush Script MT", "Courier New", monospace;
                background-color: #b6e3c2;
                text-align: left;
                text-shadow: 3px 3px black;
                font-size: 50px;
            }

            .name {
                padding: 35px;
                font-family: "Lucida Console", "Courier New", monospace;
                text-align: center;
                font-size: 40px;
                font-weight: bold;
            }

            .back {
                text-decoration-line: none;
                font-weight: bold;
                color: #97a6e8;
                font-size: 30px;
                padding: 5px;
                cursor: pointer;
                position: absolute;
                top: 700px;
                left: 622px;
            }

            .back:hover {
                color: #ffffff;
                background-color: #97a6e8;
            }

            .hint {
                color: #97a6e8;
                font-size: 30px;
                padding: 5px;
                border: none;
                font-weight: bold;
                cursor: pointer;
                background-color: #ffffff;
            }

            .hint:hover {
                color: #ffffff;
                background-color: #97a6e8;
            }

            .ik {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                top: 100px;
                left: 1330px;
            }

            .if {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                cursor: pointer;
                top: 100px;
                left: 15px;
            }

            .hid {
                font-family: "Lucida Console", "Courier New", monospace;
                position: absolute;
                font-weight: bold;
                top: 580px;
                left: 300px;
                color: #f06969;
                font-size: 80px;
            }


        </style>

        <title>Guess Who</title>
    </head>
    <body>
        <!-- HTML -->

        <h1 class="cat">Category: Video Games</h1>

        <img src="/guesswho/images/lk.jpg" class="i">

        <h2 class="name">Link (Legend Of Zelda)</h2>

        <center><button type="button" id="hintlog" class="hint">
            Hint
        </button></center>

        <a href="/guesswho/index.html" class="back">Back to Menu</a>

        <a href="../../randomlogic/random_cX.html">
            <img src="/guesswho/images/redo.png" class="ik">
        </a>

        <a type="finish" id="ff">
            <img src="/guesswho/images/forefeit.png" class="if">
        </a>

        <p id="mesg" class="hid"></p>






        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
            // JS

            const button = document.getElementById('hintlog');
                button.addEventListener('click', () => {
                document.getElementById("hintlog").innerHTML = "";
                });

            const finish = document.getElementById('ff');
                finish.addEventListener('click', () => {
                document.getElementById("hintlog").innerHTML = "";
                document.getElementById("mesg").innerHTML = "You Have Forefeit!";
                document.querySelector(".ik").remove();
                document.querySelector(".if").remove();
                });


        </script>
    </body>
</html>
