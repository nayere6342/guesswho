<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */
            body {
                background-image: url(images/backg.png);
                background-position: left top;
                background-repeat: repeat;
            }
            .title {
                color: #e37f2d;
                padding: 10px;
                font-family: "Brush Script MT", "Courier New", monospace;
                background-color: #b6e3c2;
                text-align: center;
                text-shadow: 5px 5px black;
                font-size: 150px;
            }

            .play {
                text-decoration-line: none;
                font-family: "Lucida Console", "Courier New", monospace;
                color: #863bd1;
                font-size: 70px;
                position: absolute;
                transform: translate(100%);
                top: 400px;
                left: 447px;
                padding: 10px;
                background-color: #f2c444ff;
                cursor: pointer;
            }

            .play:hover {
                font-weight: bold;
                color: #423bd1;
                font-size: 75px;
            }

            .sim {
                font-family: "Lucida Console", "Courier New", monospace;
                color: #595959ff;
                position: absolute;
                top: 2%;
                left: 88%;
                font-size: 20px;
                rotate: 5deg;
            }

            .ik {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                top: 280px;
                left: 1300px;
            }

            .ik2 {
                width: 80px;
                height: 80px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                position: absolute;
                top: 700px;
                left: 50px;
            }



        </style>

        <title>Guess Who</title>
    </head>
    <body>
        <!-- HTML -->

        <p class="title">Guess Who?</p>

        <center><a href="select.html" class="play">Play</a></center>

        <p class="sim">(version: 3.5)</p>

        <a href="/guesswho/infolog/info.html">
            <img src="/guesswho/images/info.png" class="ik">
        </a>

        <a href="/guesswho/setlog/setting.html">
            <img src="/guesswho/images/set.png" class="ik2">
        </a>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        </script>
    </body>
</html>
